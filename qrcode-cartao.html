<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code do Cartão Digital</title>
  <meta name="description" content="QR Code de acesso ao cartão digital de Talamante Morais.">

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #F5F7FA;
      color: #1F2F46;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    main {
      width: 90%;
      max-width: 340px;
      background: #EEF2F7;
      padding: 24px 20px;
      border-radius: 16px;
      box-sizing: border-box;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
      line-height: 1.2;
   
    }
    .qrcode-img {
      width: 110px !important;
      height: auto !important;
      max-width: 110px !important;
      background: #FFFFFF;
      padding: 8px;
      border-radius: 8px;
      box-sizing: border-box;
      display: block;
      margin: 0 auto;
    }

    a {
      display: block;
      margin: 20px auto 0;
      padding: 14px 18px;
      background: #1F6FB2;
      color: #FFFFFF;
      text-decoration: none;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 700;
      box-sizing: border-box;
      width: 100%;
    }
  </style>
</head>
<body>
  <main>
    <h1>Acesso Rápido</h1>
<img class="qrcode-img" src="img/qrcode-cartao.png" alt="QR Code do cartão digital">
    
<a href="img/qrcode-cartao.png" target="_blank" rel="noopener noreferrer">Acessar CODE</a>

  </main>
</body>
</html>
