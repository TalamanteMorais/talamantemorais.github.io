<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code do Cartão Digital</title>
  <meta name="description" content="QR Code de acesso ao cartão digital de Talamante Morais.">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1F2F46;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    main {
      width: 90%;
      max-width: 420px;
      background: #F5F7FA;
      color: #1F2F46;
      padding: 32px 24px;
      border-radius: 24px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 28px;
      line-height: 1.2;
    }

    img {
      width: 260px;
      max-width: 100%;
      background: #FFFFFF;
      padding: 16px;
      border-radius: 18px;
      box-sizing: border-box;
    }

    a {
      display: block;
      margin-top: 28px;
      padding: 16px 20px;
      background: #1F2F46;
      color: #FFFFFF;
      text-decoration: none;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Acesso Rápido</h1>
<img src="imagem/qrcode-cartao.png" alt="QR Code do cartão digital">
    <a href="https://www.taggy.bio/59078827" target="_blank" rel="noopener noreferrer">Abrir cartão digital</a>
  </main>
</body>
</html>
